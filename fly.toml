# fly.toml — Dragon Router deployment config
# See https://fly.io/docs/reference/configuration/

app = 'dragon-router-app'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'dragon_data'
  destination = '/app/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 20128
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  TZ = "Asia/Kolkata"
  HOST = "0.0.0.0"
  HOSTNAME = "0.0.0.0"
  PORT = "20128"
  DATA_DIR = "/app/data"
