services:
  - type: web
    name: dragon-router
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 20128
      - key: DATA_DIR
        value: /app/data
      - key: DRAGONROUTER_USE_TURBOPACK
        value: "0"
      - key: TZ
        value: Asia/Kolkata
      - key: JWT_SECRET
        sync: false
      - key: API_KEY_SECRET
        sync: false
      - key: INITIAL_PASSWORD
        sync: false
